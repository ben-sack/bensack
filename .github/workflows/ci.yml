name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://example.com
        run: npm run build
